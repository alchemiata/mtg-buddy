<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#18130f" />
<title>MTG Buddy</title>
<style>
:root{--bg:#18130f;--surface:#251e18;--surface2:#342a21;--card:#2a221b;--text:#fff8ea;--muted:#bfae96;--accent:#f0cf87;--danger:#ff8b7f;--border:rgba(255,248,234,.13);font-family:Aptos,Segoe UI,system-ui,sans-serif;color:#fff8ea;background:#18130f}*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:var(--bg);overflow:hidden}h1,h2,.display{font-family:Cinzel,Copperplate,"Palatino Linotype",Georgia,serif}button,input{font:inherit;color:inherit}button{border:0}.app{min-height:100dvh;padding-bottom:calc(5.8rem + env(safe-area-inset-bottom));max-width:1100px;margin:0 auto}.screen{display:none;min-height:calc(100dvh - 6rem)}.screen.active{display:flex;flex-direction:column}.life{min-height:36dvh;display:flex;flex-direction:column;padding:1rem;border-radius:0 0 2rem 2rem;background-size:cover;background-position:center;box-shadow:0 18px 50px rgba(0,0,0,.34)}.top{display:flex;justify-content:space-between;align-items:center}.eyebrow{font-size:.75rem;text-transform:uppercase;letter-spacing:.18em;color:#ffffffb3;font-weight:900}.title{margin:0;font-size:1.25rem}.reset{min-height:3rem;border-radius:999px;background:#0006;padding:0 1rem;font-weight:900}.lifegrid{flex:1;display:grid;grid-template-columns:4.5rem 1fr 4.5rem;gap:.5rem;align-items:center}.lifeNum{text-align:center;font-size:clamp(6rem,31vw,10.5rem);font-weight:900;line-height:.9;text-shadow:0 12px 42px #0009,0 0 28px #f4dc973d}.bigbtn{min-height:5.2rem;border-radius:1.5rem;background:#0008;font-size:3rem;font-weight:1000}.chips,.bgs{display:flex;gap:.5rem;overflow:auto}.panel{border:1px solid #ffffff24;background:#0006;border-radius:1.5rem;padding:.75rem;backdrop-filter:blur(20px)}.chip{min-height:2.75rem;border-radius:999px;background:#ffffff24;padding:0 1rem;font-weight:900;white-space:nowrap}.chip.active{background:#fff;color:#15100c}.tracker{height:calc(64dvh - 5.8rem);padding:1rem;display:flex;flex-direction:column}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}.head h2{margin:0;font-size:1.6rem}.muted{color:var(--muted);font-weight:700}.add{min-height:3rem;border-radius:999px;background:var(--accent);color:#1b130c;padding:0 1.1rem;font-weight:900}.list{overflow:auto;display:grid;gap:.75rem}.empty,.card,.section,.entry{background:var(--surface);border:1px solid var(--border);border-radius:1.5rem;padding:1rem;box-shadow:0 14px 36px rgba(25,19,11,.16)}.name{width:100%;min-height:3rem;border-radius:1rem;background:var(--surface2);border:0;padding:0 1rem;font-size:1.2rem;font-weight:900;outline:none;margin-bottom:.75rem}.stats{display:grid;gap:.75rem}.stat{background:var(--surface2);border-radius:1.25rem;padding:.75rem}.statTop{display:flex;justify-content:space-between;align-items:center}.actual{font-size:2rem;font-weight:1000}.base{display:grid;grid-template-columns:auto 1fr;gap:.5rem;align-items:center;background:var(--card);border-radius:1rem;padding:.45rem .75rem;margin:.5rem 0}.base input{min-height:2.25rem;background:transparent;border:0;text-align:right;font-weight:900;outline:none}.step{display:grid;grid-template-columns:3.25rem 1fr 3.25rem;gap:.5rem}.step button,.modifier{min-height:3.25rem;border-radius:1rem;background:var(--card);display:grid;place-items:center;font-size:1.4rem;font-weight:1000}.modifier{color:var(--accent);font-size:1.1rem}.danger{background:#ef444426;color:var(--danger)}.nav{position:fixed;left:0;right:0;bottom:0;padding:.5rem .75rem calc(.7rem + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;background:rgba(25,19,15,.88);backdrop-filter:blur(28px);border-top:1px solid #ffffff20}.nav button{min-height:3.5rem;border-radius:1rem;background:transparent;color:var(--muted);font-weight:900}.nav button.active{background:var(--accent);color:#1b130c}.page{padding:1rem;overflow:auto}.search{width:100%;min-height:3.5rem;border-radius:1.25rem;border:1px solid var(--border);background:var(--surface);padding:0 1rem;margin:.75rem 0 1rem;font-weight:800;outline:none}.entry{margin-bottom:.5rem}.entry summary{font-weight:900;font-size:1.1rem;cursor:pointer}.entry p{color:#eadcc5;line-height:1.55}.settingsGrid{display:grid;gap:.75rem}@media(min-width:760px){body{overflow:auto}.app{padding:1.25rem 1.25rem 6rem}.screen.active#game{display:grid;grid-template-columns:minmax(22rem,.85fr) 1.15fr;gap:1.25rem}.life{min-height:calc(100dvh - 8rem);border-radius:2rem}.tracker{height:calc(100dvh - 2.5rem);background:var(--surface);border-radius:2rem}.stats{grid-template-columns:1fr 1fr}.nav{left:50%;transform:translateX(-50%);max-width:28rem;border-radius:1.35rem 1.35rem 0 0}}
</style>
</head>
<body>
<div class="app">
<section id="game" class="screen active"><div id="life" class="life"><div class="top"><div><div class="eyebrow">Command Zone</div><h1 class="title">MTG Buddy</h1></div><button class="reset" onclick="resetLife()">Reset</button></div><div class="lifegrid"><button class="bigbtn" onclick="changeLife(-1)">-</button><output id="lifeNum" class="lifeNum">40</output><button class="bigbtn" onclick="changeLife(1)">+</button></div><div class="panel"><div id="lifeChips" class="chips"></div><div id="bgChips" class="bgs" style="margin-top:.6rem"></div></div></div><div class="tracker"><div class="head"><div><h2>Permanent Ledger</h2><div id="count" class="muted">Track changing stats</div></div><button class="add" onclick="addCard()">Add Permanent</button></div><div id="cards" class="list"></div></div></section>
<section id="glossary" class="screen page"><div class="eyebrow">Rules Tome</div><h1>Glossary</h1><input id="search" class="search" placeholder="Search spells, counters, combat..." oninput="renderGlossary()" /><div id="terms"></div></section>
<section id="settings" class="screen page"><div class="eyebrow">Sanctum Setup</div><h1>Settings</h1><div class="settingsGrid"><div class="section"><h2>Starting Life</h2><div id="settingsLife" class="chips"></div></div><div class="section"><h2>Life Background</h2><div id="settingsBg" class="bgs"></div></div><div class="section"><h2 style="color:var(--danger)">Reset Saved Data</h2><button class="add danger" onclick="resetAll()">Reset Everything</button></div></div></section>
</div><nav class="nav"><button class="active" onclick="tab('game',this)">20<br>Game</button><button onclick="tab('glossary',this)">AZ<br>Glossary</button><button onclick="tab('settings',this)">*<br>Settings</button></nav>
<script>
const backgrounds=[['forest','Forest','public/backgrounds/forest-custom.svg'],['island','Island','public/backgrounds/island-custom.svg'],['swamp','Swamp','public/backgrounds/swamp-custom.svg'],['mountain','Mountain','public/backgrounds/mountain-custom.svg'],['plains','Snow Plains','public/backgrounds/plains-custom.svg'],['colorless','Colorless','public/backgrounds/colorless.svg'],['arcane','Arcane','public/backgrounds/arcane.svg'],['dark-marble','Dark Marble','public/backgrounds/dark-marble.svg'],['wood-table','Wood Table','public/backgrounds/wood-table.svg']];
const terms=[['Flying','Can be blocked only by creatures with flying or reach.'],['Trample','Extra combat damage can hit the defending player.'],['Deathtouch','Any amount of damage from this source is lethal to creatures.'],['Ward','Opponents must pay an extra cost to target it.'],['Hexproof','Opponents cannot target it.'],['Indestructible','Cannot be destroyed by damage or destroy effects.'],['Lifelink','Damage from this source also gains you that much life.'],['Commander Tax','Your commander costs two more each time you recast it from the command zone.'],['Commander Damage','Twenty-one combat damage from one commander can eliminate a player.'],['Stack','The waiting area for spells and abilities. Newest resolves first.'],['Priority','The permission to act before the game moves on.'],['Scry','Look at top cards and keep or bottom them.'],['Surveil','Look at top cards and keep or graveyard them.'],['Proliferate','Add another counter to permanents or players that already have counters.'],['Mill','Put cards from the top of a library into a graveyard.']];
let state=JSON.parse(localStorage.getItem('mtg-buddy')||'null')||{life:40,startingLife:40,bg:'forest',cards:[]};
function save(){localStorage.setItem('mtg-buddy',JSON.stringify(state))}function bgUrl(){return backgrounds.find(b=>b[0]===state.bg)?.[2]||backgrounds[0][2]}function render(){document.getElementById('life').style.backgroundImage=`radial-gradient(circle at 50% 42%,rgba(12,8,5,.04),rgba(12,8,5,.5) 58%,rgba(12,8,5,.86)),url(${bgUrl()})`;document.getElementById('lifeNum').textContent=state.life;renderChips();renderCards();save()}function changeLife(d){state.life=Math.max(0,state.life+d);render()}function resetLife(){state.life=state.startingLife;render()}function setLifeStart(v){state.startingLife=v;state.life=v;render()}function setBg(v){state.bg=v;render()}function renderChips(){for(const id of ['lifeChips','settingsLife'])document.getElementById(id).innerHTML=[20,30,40].map(v=>`<button class="chip ${state.startingLife===v?'active':''}" onclick="setLifeStart(${v})">${v}</button>`).join('');for(const id of ['bgChips','settingsBg'])document.getElementById(id).innerHTML=backgrounds.map(b=>`<button class="chip ${state.bg===b[0]?'active':''}" onclick="setBg('${b[0]}')">${b[1]}</button>`).join('')}function addCard(){state.cards.unshift({id:crypto.randomUUID(),name:'New permanent',baseAttack:0,baseDefense:0,attack:0,defense:0});render()}function mod(id,k,d){let c=state.cards.find(x=>x.id===id);c[k]+=d;render()}function base(id,k,v){let c=state.cards.find(x=>x.id===id);c[k]=Number(v)||0;render()}function nameCard(id,v){state.cards.find(x=>x.id===id).name=v;save()}function delCard(id){state.cards=state.cards.filter(x=>x.id!==id);render()}function resetCard(id){let c=state.cards.find(x=>x.id===id);c.attack=0;c.defense=0;render()}function fmt(n){return n>=0?'+'+n:''+n}function stat(c,label,baseKey,modKey){let actual=c[baseKey]+c[modKey];return `<div class="stat"><div class="statTop"><b>${label}</b><span class="actual">${actual}</span></div><label class="base"><span>Base</span><input type="number" value="${c[baseKey]}" onchange="base('${c.id}','${baseKey}',this.value)"></label><div class="step"><button onclick="mod('${c.id}','${modKey}',-1)">-</button><output class="modifier">${fmt(c[modKey])}</output><button onclick="mod('${c.id}','${modKey}',1)">+</button></div></div>`}function renderCards(){document.getElementById('count').textContent=state.cards.length?`${state.cards.length} permanent${state.cards.length===1?'':'s'}`:'Track changing stats';document.getElementById('cards').innerHTML=state.cards.length?state.cards.map(c=>`<article class="card"><input class="name" value="${c.name}" oninput="nameCard('${c.id}',this.value)"><div class="stats">${stat(c,'Attack','baseAttack','attack')}${stat(c,'Defense','baseDefense','defense')}</div><div class="step" style="grid-template-columns:1fr 1fr;margin-top:.75rem"><button onclick="resetCard('${c.id}')">Reset</button><button class="danger" onclick="delCard('${c.id}')">Delete</button></div></article>`).join(''):'<div class="empty"><b>No cards yet</b><p class="muted">Add permanents whose stats keep shifting during the game.</p></div>'}function renderGlossary(){let q=document.getElementById('search').value.toLowerCase();document.getElementById('terms').innerHTML=terms.filter(t=>(t[0]+t[1]).toLowerCase().includes(q)).map(t=>`<details class="entry"><summary>${t[0]}</summary><p>${t[1]}</p></details>`).join('')}function tab(id,btn){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGlossary()}function resetAll(){localStorage.removeItem('mtg-buddy');state={life:40,startingLife:40,bg:'forest',cards:[]};render()}render();renderGlossary();
</script>
</body>
</html>
