<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>MTG Buddy</title><style>
:root{--panel:#241c16e6;--panel2:#34281fee;--text:#fff7e8;--muted:#c8b89e;--gold:#f0cf87;--red:#ff8b7f;font-family:Segoe UI,Aptos,system-ui,sans-serif;color:var(--text)}*{box-sizing:border-box}body{margin:0;min-height:100dvh;overflow:hidden;background-attachment:fixed;background-size:cover;background-position:center}body.forest{background-image:radial-gradient(circle at 50% 12%,#ffffff18,transparent 34%),linear-gradient(#0c08058a,#0c0805e6),linear-gradient(135deg,#164c2c,#83a35b,#5b3920)}body.island{background-image:radial-gradient(circle at 50% 12%,#ffffff3d,transparent 34%),linear-gradient(#0c08054d,#0c0805cc),linear-gradient(135deg,#72c7ed,#f5f2df,#217da9)}body.swamp{background-image:radial-gradient(circle at 50% 12%,#78ffa024,transparent 34%),linear-gradient(#0c08058a,#0c0805e6),linear-gradient(135deg,#08070c,#2d2037,#314836)}body.mountain{background-image:radial-gradient(circle at 50% 12%,#ffbe502e,transparent 34%),linear-gradient(#0c080570,#0c0805e6),linear-gradient(135deg,#551814,#c06434,#1d0e0d)}body.plains{background-image:radial-gradient(circle at 50% 12%,#ffffff66,transparent 34%),linear-gradient(#0c080540,#0c0805bf),linear-gradient(135deg,#e7f4ff,#f7f1dd,#9aa7b8)}button,input{font:inherit;color:inherit}button{border:0}.app{max-width:1100px;margin:0 auto;min-height:100dvh;padding-bottom:1rem}.screen{display:none;min-height:100dvh}.screen.on{display:flex;flex-direction:column}.hero{min-height:38dvh;border-radius:0 0 2rem 2rem;padding:1rem;display:flex;flex-direction:column;background:radial-gradient(circle at 50% 42%,#ffffff12,#0008 62%,#000c);box-shadow:0 20px 50px #0008}.top,.head{display:flex;justify-content:space-between;align-items:center;gap:.75rem}.eyebrow{font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;color:#ffffffb8;font-weight:900}.brand,.head h2{margin:0;font-family:Georgia,serif}.brand{font-size:1.35rem}.reset,.add,.chip{min-height:2.65rem;border-radius:999px;background:#0008;padding:0 .9rem;font-weight:900}.lifeRow{flex:1;display:grid;grid-template-columns:4.5rem 1fr 4.5rem;gap:.5rem;align-items:center}.life{font-family:Georgia,serif;text-align:center;font-size:clamp(6rem,30vw,10rem);line-height:.9;font-weight:900;text-shadow:0 12px 42px #000}.big{min-height:5rem;border-radius:1.4rem;background:#0009;font-size:3rem;font-weight:1000}.chips{display:flex;gap:.5rem;overflow:auto;padding:.65rem;background:#0007;border:1px solid #ffffff22;border-radius:1.4rem;backdrop-filter:blur(16px)}.chip{white-space:nowrap}.chip.sel,.add{background:var(--gold);color:#1b130c}.tracker{height:calc(62dvh - 1rem);padding:.75rem;display:flex;flex-direction:column;background:#120d092e}.head h2{font-size:1.25rem}.muted{color:var(--muted);font-weight:700;font-size:.8rem}.list{overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem;padding-bottom:5.25rem}.card,.empty,.pagePanel,.term{background:var(--panel);border:1px solid #ffffff20;border-radius:1rem;padding:.5rem;box-shadow:0 14px 36px #0004;backdrop-filter:blur(10px)}.empty{grid-column:1/-1;padding:1rem}.name{width:100%;min-height:2.25rem;border:0;border-radius:.75rem;background:var(--panel2);padding:0 .65rem;font-weight:900;font-size:.95rem;outline:none}.name::placeholder{color:var(--muted)}.stats{display:grid;gap:.45rem;margin-top:.45rem}.stat{background:var(--panel2);border-radius:.8rem;padding:.45rem}.statTop{display:flex;justify-content:space-between;align-items:center}.statTop b{font-size:.68rem;color:var(--muted)}.actual{font-size:1.55rem;font-weight:1000}.base{display:grid;grid-template-columns:auto 1fr;gap:.3rem;align-items:center;background:#1b1410;border-radius:.65rem;margin:.3rem 0;padding:.25rem .45rem;font-size:.68rem}.base input{background:transparent;border:0;outline:none;text-align:right;font-weight:900;min-width:0}.step{display:grid;grid-template-columns:2rem 1fr 2rem;gap:.25rem}.step button,.mod{min-height:2rem;border-radius:.6rem;background:#1b1410;display:grid;place-items:center;font-size:1rem;font-weight:1000}.mod{color:var(--gold);font-size:.85rem}.danger{background:#ef444426!important;color:var(--red)!important}.page{height:100dvh;overflow:auto;padding:1rem 1rem 5.5rem;background:#120d0942;backdrop-filter:blur(8px)}.search{width:100%;min-height:3.2rem;background:var(--panel);border:1px solid #ffffff20;border-radius:1rem;padding:0 1rem;margin:.75rem 0 1rem;font-weight:800;outline:none}.term{margin:.5rem 0;padding:.85rem}.term summary{font-weight:900;cursor:pointer}.term p{color:#eadcc5;line-height:1.55}.fabWrap{position:fixed;right:.75rem;bottom:calc(1rem + env(safe-area-inset-bottom));z-index:20;display:flex;flex-direction:column;align-items:flex-end;gap:.7rem}.menu{display:none;width:min(21rem,calc(100vw - 1.5rem));background:#19130fe8;border:1px solid #ffffff22;border-radius:1.25rem;padding:.75rem;box-shadow:0 18px 60px #0009;backdrop-filter:blur(24px)}.menu.open{display:block}.navGrid,.skinGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem}.skinGrid{margin-top:.65rem}.menu button{min-height:2.65rem;border-radius:.85rem;background:#ffffff14;color:var(--muted);font-weight:900;font-size:.76rem}.menu button.on,.skinGrid button.sel{background:var(--gold);color:#1b130c}.skinGrid button{display:flex;align-items:center;gap:.35rem;padding:0 .45rem;text-align:left}.dot{width:1rem;height:1rem;border-radius:50%;background:linear-gradient(135deg,#777,#ddd);flex:0 0 auto}.fab{width:3.5rem;height:3.5rem;border-radius:50%;background:var(--gold);color:#1b130c;font-size:1.6rem;font-weight:1000;box-shadow:0 12px 40px #0009}@media(min-width:760px){body{overflow:auto}.app{padding:1.25rem}.screen.on#game{display:grid;grid-template-columns:minmax(22rem,.85fr) 1.15fr;gap:1.25rem}.hero{min-height:calc(100dvh - 2.5rem);border-radius:2rem}.tracker{height:calc(100dvh - 2.5rem);border-radius:2rem}.list{gap:.75rem}.page{height:calc(100dvh - 2.5rem);max-width:48rem;margin:1.25rem auto;border-radius:2rem}.fabWrap{right:1.25rem}}
</style></head><body class="forest"><div class="app"><section id="game" class="screen on"><div class="hero"><div class="top"><div><div class="eyebrow">Command Zone</div><h1 class="brand">MTG Buddy</h1></div><button class="reset" onclick="resetLife()">Reset</button></div><div class="lifeRow"><button class="big" onclick="life(-1)">-</button><output id="life" class="life">40</output><button class="big" onclick="life(1)">+</button></div><div id="heroChips" class="chips"></div></div><div class="tracker"><div class="head"><div><h2>Permanent Ledger</h2><div id="count" class="muted">Track changing stats</div></div><button class="add" onclick="addCard()">Add</button></div><div id="cards" class="list"></div></div></section><section id="glossary" class="screen page"><div class="eyebrow">Rules Tome</div><h1 class="brand">Glossary</h1><input id="q" class="search" placeholder="Search flying, trample, commander..." oninput="renderGlossary()"><div id="terms"></div></section><section id="settings" class="screen page"><div class="eyebrow">Sanctum Setup</div><h1 class="brand">Settings</h1><div class="pagePanel"><h2>Starting Life</h2><div id="lifeChips" class="chips"></div></div><div class="pagePanel" style="margin-top:1rem"><button class="add danger" onclick="resetAll()">Reset Everything</button></div></section></div><div class="fabWrap"><nav id="menu" class="menu" aria-label="App menu"><div id="navGrid" class="navGrid"></div><div id="skinGrid" class="skinGrid"></div></nav><button class="fab" onclick="toggleMenu()" aria-label="Open app menu">?</button></div><script>
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});if(window.caches)caches.keys().then(keys=>keys.forEach(k=>caches.delete(k))).catch(()=>{})}
const bgs=['forest','island','swamp','mountain','plains'];const names={forest:'Forest',island:'Island',swamp:'Swamp',mountain:'Mountain',plains:'Snow Plains'};const glossary=[['Adapt','Put counters on a creature if it has no +1/+1 counters on it.'],['Affinity','A spell costs less for each matching permanent you control.'],['Attach','Put an Aura, Equipment, or similar card onto a legal object.'],['Cascade','Reveal cards until you find a cheaper nonland spell, then you may cast it free.'],['Clue','Artifact token you can pay 2 and sacrifice to draw a card.'],['Commander Damage','21 combat damage from the same commander makes a player lose.'],['Commander Tax','Your commander costs 2 more for each previous command-zone cast.'],['Convoke','Tap creatures to help pay for a spell.'],['Crew','Tap creatures to turn a Vehicle into a creature.'],['Deathtouch','Any amount of damage from this source is lethal to creatures.'],['Defender','This creature cannot attack.'],['Double Strike','Deals combat damage in both first-strike and regular damage steps.'],['Enchant','Shows what an Aura can legally attach to.'],['Equip','Attach Equipment to a creature you control, usually as a sorcery.'],['Exile','A separate zone outside battlefield and graveyard.'],['First Strike','Deals combat damage before creatures without first strike.'],['Flash','You can cast it any time you could cast an instant.'],['Flying','Can be blocked only by creatures with flying or reach.'],['Food','Artifact token you can pay 2 and sacrifice to gain 3 life.'],['Graveyard','The discard pile where destroyed, used, and discarded cards often go.'],['Haste','Can attack and use tap abilities right away.'],['Hexproof','Opponents cannot target it.'],['Indestructible','Cannot be destroyed by damage or destroy effects.'],['Investigate','Create a Clue token.'],['Landfall','Triggers when a land enters under your control.'],['Lifelink','Damage from this source also gains you that much life.'],['Manifest','Put a card face down as a 2/2 creature.'],['Menace','Can be blocked only by two or more creatures.'],['Mill','Put cards from the top of a library into a graveyard.'],['Morph','Cast a card face down as a 2/2, then turn it up for its morph cost.'],['Populate','Create a copy of a creature token you control.'],['Priority','The permission to act before the game moves on.'],['Proliferate','Add another counter to permanents or players that already have counters.'],['Prowess','Gets +1/+1 whenever you cast a noncreature spell.'],['Reach','Can block creatures with flying.'],['Scry','Look at top cards and keep or bottom them.'],['Stack','The waiting area for spells and abilities. Newest resolves first.'],['Surveil','Look at top cards and keep or put them into your graveyard.'],['Treasure','Artifact token you can tap and sacrifice for one mana of any color.'],['Trample','Extra combat damage can hit the defending player.'],['Vigilance','Attacking does not tap this creature.'],['Ward','Opponents must pay an extra cost to target it.']];let s=JSON.parse(localStorage.getItem('mtg-buddy-v2')||'null')||{life:40,start:40,bg:'forest',tab:'game',cards:[]};function save(){localStorage.setItem('mtg-buddy-v2',JSON.stringify(s))}function fmt(n){return n>=0?'+'+n:''+n}function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;')}function render(){document.body.className=s.bg;document.getElementById('life').textContent=s.life;document.getElementById('heroChips').innerHTML=[20,30,40].map(v=>`<button class="chip ${s.start===v?'sel':''}" onclick="setStart(${v})">${v}</button>`).join('');document.getElementById('lifeChips').innerHTML=document.getElementById('heroChips').innerHTML;document.getElementById('navGrid').innerHTML=[['game','20','Game'],['glossary','AZ','Glossary'],['settings','*','Settings']].map(t=>`<button class="${s.tab===t[0]?'on':''}" onclick="tab('${t[0]}')">${t[1]}<br>${t[2]}</button>`).join('');document.getElementById('skinGrid').innerHTML=bgs.map(x=>`<button class="${s.bg===x?'sel':''}" onclick="setBg('${x}')"><span class="dot"></span><span>${names[x]}</span></button>`).join('');renderCards();save()}function life(d){s.life=Math.max(0,s.life+d);render()}function resetLife(){s.life=s.start;render()}function setStart(v){s.start=v;s.life=v;render()}function setBg(v){s.bg=v;render()}function toggleMenu(){document.getElementById('menu').classList.toggle('open')}function addCard(){s.cards.unshift({id:Date.now()+Math.random()+'',name:'',ba:0,bd:0,a:0,d:0});render()}function resetCard(id){let c=s.cards.find(x=>x.id===id);c.a=0;c.d=0;render()}function delCard(id){s.cards=s.cards.filter(x=>x.id!==id);render()}function change(id,k,d){s.cards.find(x=>x.id===id)[k]+=d;render()}function setBase(id,k,v){s.cards.find(x=>x.id===id)[k]=Number(v)||0;render()}function rename(id,v){s.cards.find(x=>x.id===id).name=v;save()}function clearName(el,id){let c=s.cards.find(x=>x.id===id);if(c&&c.name==='New permanent'){c.name='';el.value='';save()}}function stat(c,label,b,m){return `<div class="stat"><div class="statTop"><b>${label==='Attack'?'ATK':'DEF'}</b><span class="actual">${c[b]+c[m]}</span></div><label class="base"><span>Base</span><input type="number" value="${c[b]}" onchange="setBase('${c.id}','${b}',this.value)"></label><div class="step"><button onclick="change('${c.id}','${m}',-1)">-</button><output class="mod">${fmt(c[m])}</output><button onclick="change('${c.id}','${m}',1)">+</button></div></div>`}function renderCards(){document.getElementById('count').textContent=s.cards.length?`${s.cards.length} permanent${s.cards.length===1?'':'s'}`:'Track changing stats';document.getElementById('cards').innerHTML=s.cards.length?s.cards.map(c=>`<article class="card"><input class="name" value="${esc(c.name)}" placeholder="Permanent name" onfocus="clearName(this,'${c.id}')" oninput="rename('${c.id}',this.value)"><div class="stats">${stat(c,'Attack','ba','a')}${stat(c,'Defense','bd','d')}</div><div class="step" style="grid-template-columns:1fr 1fr;margin-top:.45rem"><button onclick="resetCard('${c.id}')">Reset</button><button class="danger" onclick="delCard('${c.id}')">Delete</button></div></article>`).join(''):'<div class="empty"><b>No cards yet</b><p class="muted">Add permanents whose stats keep shifting during the game.</p></div>'}function renderGlossary(){let q=document.getElementById('q').value.toLowerCase();document.getElementById('terms').innerHTML=glossary.filter(t=>(t[0]+t[1]).toLowerCase().includes(q)).map(t=>`<details class="term"><summary>${t[0]}</summary><p>${t[1]}</p></details>`).join('')}function tab(id){s.tab=id;document.querySelectorAll('.screen').forEach(x=>x.classList.toggle('on',x.id===id));document.getElementById('menu').classList.remove('open');render();renderGlossary()}function resetAll(){localStorage.removeItem('mtg-buddy-v2');s={life:40,start:40,bg:'forest',tab:'game',cards:[]};tab('game')}tab(s.tab||'game');render();renderGlossary();
</script></body></html>
