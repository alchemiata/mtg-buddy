<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MTG Buddy</title>
<style>
:root{--panel:#241c16e6;--panel2:#34281fee;--text:#fff7e8;--muted:#c8b89e;--gold:#f0cf87;--red:#ff8b7f;--forest:url(https://raw.githubusercontent.com/alchemiata/mtg-buddy/main/public/backgrounds/forest-custom.png);--island:url(https://raw.githubusercontent.com/alchemiata/mtg-buddy/main/public/backgrounds/island-custom.png);--swamp:url(https://raw.githubusercontent.com/alchemiata/mtg-buddy/main/public/backgrounds/swamp-custom.png);--mountain:url(https://raw.githubusercontent.com/alchemiata/mtg-buddy/main/public/backgrounds/mountain-custom.png);--plains:url(https://raw.githubusercontent.com/alchemiata/mtg-buddy/main/public/backgrounds/plains-custom.png);font-family:Segoe UI,Aptos,system-ui,sans-serif;color:var(--text)}*{box-sizing:border-box}html{min-height:100%;background:#18130f}body{margin:0;min-height:100dvh;overflow:hidden;background-image:radial-gradient(circle at 50% 12%,#ffffff20,transparent 34%),linear-gradient(#0c08058a,#0c0805de),var(--land);background-attachment:fixed;background-size:cover;background-position:center}body.forest{--land:var(--forest)}body.island{--land:var(--island)}body.swamp{--land:var(--swamp)}body.mountain{--land:var(--mountain)}body.plains{--land:var(--plains)}button,input{font:inherit;color:inherit}button{border:0}.app{max-width:430px;margin:0 auto;min-height:100dvh;padding-bottom:calc(1rem + env(safe-area-inset-bottom))}.game{min-height:100dvh;display:flex;flex-direction:column;gap:.75rem;padding:.75rem;background:linear-gradient(#120d090f,#120d093d)}.hero{min-height:35dvh;border:1px solid #ffffff24;border-radius:1.75rem;padding:1rem;display:flex;flex-direction:column;background:radial-gradient(circle at 50% 42%,#ffffff12,#0008 62%,#000c);box-shadow:0 22px 58px #0008,0 2px 0 #ffffff14 inset}.top,.head{display:flex;justify-content:space-between;align-items:center;gap:.75rem}.eyebrow{font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;color:#ffffffb8;font-weight:900}.brand,.head h2{margin:0;font-family:Georgia,serif}.brand{font-size:1.35rem}.topActions{position:relative;display:flex;align-items:center;gap:.45rem}.reset,.add,.chip,.startBtn{min-height:2.65rem;border-radius:999px;background:#0008;padding:0 .9rem;font-weight:900}.startMenu{display:none;position:absolute;right:0;top:calc(100% + .5rem);z-index:10;width:min(11rem,calc(100vw - 2rem));border:1px solid #ffffff26;border-radius:1rem;background:#100c09e8;padding:.65rem;box-shadow:0 18px 50px #0009;backdrop-filter:blur(20px)}.startMenu.open{display:block}.startGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem}.startGrid button{min-height:2.5rem;border-radius:.75rem;background:#ffffff24;font-weight:900}.startGrid button.sel{background:#fff;color:#1b130c}.lifeRow{flex:1;display:grid;grid-template-columns:4.5rem 1fr 4.5rem;gap:.5rem;align-items:center}.life{font-family:Georgia,serif;text-align:center;font-size:clamp(6rem,30vw,10rem);line-height:.9;font-weight:900;text-shadow:0 12px 42px #000}.big{min-height:5rem;border-radius:1.4rem;background:#0009;font-size:3rem;font-weight:1000}.chip{white-space:nowrap}.chip.sel,.add{background:var(--gold);color:#1b130c}.tracker{padding:.25rem .1rem .75rem;display:flex;flex:1;min-height:0;flex-direction:column;background:transparent}.head h2{font-size:1.25rem}.muted{color:var(--muted);font-weight:700;font-size:.8rem}.list{overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem;padding-bottom:5.25rem}.card{position:relative;min-height:9.4rem;background:linear-gradient(#fff7e80a,transparent 44%),var(--panel);border:1px solid #ffffff20;border-radius:1rem;padding:.55rem;box-shadow:0 12px 30px #0007;backdrop-filter:blur(10px)}.empty,.panel,.term{background:var(--panel);border:1px solid #ffffff20;border-radius:1rem;padding:.5rem;box-shadow:0 14px 36px #0004;backdrop-filter:blur(10px)}.empty{grid-column:1/-1;padding:1rem}.cardTop{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:.4rem}.name{width:100%;min-width:0;min-height:2.1rem;border:0;border-radius:.65rem;background:var(--panel2);padding:0 .55rem;font-weight:1000;font-size:.95rem;outline:none}.name::placeholder{color:var(--muted)}.basePair{display:grid;grid-template-columns:1.55rem auto 1.55rem;align-items:center;min-height:2.1rem;border-radius:.65rem;background:var(--panel2);padding:0 .35rem;color:var(--muted);font-size:.95rem;font-weight:1000}.basePair input{width:1.55rem;border:0;background:transparent;text-align:center;font-size:1rem;font-weight:1000;outline:none}.statline{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.55rem;padding:.25rem .25rem .15rem;font-family:Georgia,serif;font-size:clamp(2.45rem,13vw,3.35rem);font-weight:1000;line-height:.98}.statline span:first-child{text-align:right}.statline span:last-child{text-align:left}.modRow{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}.modCluster{display:grid;grid-template-columns:1fr 1.65rem;gap:.3rem}.mod{min-height:2.35rem;border-radius:.7rem;background:var(--panel2);display:grid;place-items:center;color:var(--gold);font-size:1rem;font-weight:1000}.modBtns{display:grid;gap:.25rem}.mini{min-height:1.05rem;border-radius:.45rem;background:var(--panel2);font-size:.8rem;font-weight:1000;line-height:1}.cardActions{position:absolute;right:.45rem;bottom:.45rem;display:flex;gap:.25rem}.cardAction{min-height:1.45rem;border-radius:999px;background:#ffffff14;padding:0 .45rem;color:var(--muted);font-size:.62rem;font-weight:1000}.danger{background:#ef444426!important;color:var(--red)!important}.fabWrap{position:fixed;right:.75rem;bottom:calc(1rem + env(safe-area-inset-bottom));z-index:20;display:flex;flex-direction:column;align-items:flex-end;gap:.7rem}.menu{display:none;width:min(21rem,calc(100vw - 1.5rem));background:#19130fe8;border:1px solid #ffffff22;border-radius:1.25rem;padding:.75rem;box-shadow:0 18px 60px #0009;backdrop-filter:blur(24px)}.menu.open{display:block}.navGrid,.skinGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem}.menu button{min-height:2.8rem;border-radius:.85rem;background:#ffffff14;color:var(--text);font-weight:900;font-size:.76rem}.fab{width:3.5rem;height:3.5rem;border-radius:50%;background:var(--gold);color:#1b130c;box-shadow:0 12px 40px #0009;display:grid;place-items:center}.hamb,.hamb:before,.hamb:after{display:block;width:1.45rem;height:.16rem;border-radius:99px;background:currentColor}.hamb{position:relative}.hamb:before,.hamb:after{content:"";position:absolute;left:0}.hamb:before{top:-.48rem}.hamb:after{top:.48rem}.overlay{display:none;position:fixed;inset:0;z-index:30;align-items:center;justify-content:center;padding:1rem;background:#0403026b;backdrop-filter:blur(7px)}.overlay.open{display:flex}.sheet{position:relative;width:min(398px,100%);height:min(88dvh,760px);display:flex;flex-direction:column;border:1px solid #ffffff20;border-radius:1.65rem;padding:.75rem 0 0;background:#18130fc2;box-shadow:0 28px 90px #0009;backdrop-filter:blur(22px);overflow:hidden}.close{position:absolute;right:.85rem;top:.85rem;z-index:4;width:2.75rem;height:2.75rem;border-radius:50%;background:#ffffff1f;font-size:1.3rem;font-weight:1000}.overlayBody{min-height:0;flex:1;overflow:auto;padding:.75rem 1rem 1rem}.stickyHead{position:sticky;top:-.75rem;z-index:3;margin:-.75rem -1rem .75rem;padding:.75rem 1rem .8rem;border-radius:1.25rem 1.25rem 0 0;background:#18130fde;backdrop-filter:blur(18px)}.search{width:100%;min-height:3.2rem;background:var(--panel);border:1px solid #ffffff20;border-radius:1rem;padding:0 1rem;margin:.75rem 0 0;font-weight:800;outline:none}.term{margin:.5rem 0;padding:.85rem}.term summary{font-weight:900;cursor:pointer}.term p{color:#eadcc5;line-height:1.55}.panel{padding:1rem;margin-bottom:1rem}.skinGrid{grid-template-columns:repeat(2,1fr)}.skinGrid button{display:flex;align-items:center;gap:.5rem;padding:0 .65rem;text-align:left;min-height:3.25rem;border-radius:.85rem;background:#ffffff14;font-weight:900}.skinGrid button.sel{background:var(--gold);color:#1b130c}.thumb{width:1.6rem;height:1.6rem;border-radius:.45rem;background-image:var(--thumb);background-size:cover;background-position:center;flex:0 0 auto}@media(min-width:760px){body{overflow:hidden}.life{font-size:clamp(7rem,15vw,13rem)}.fabWrap{right:calc((100vw - 430px)/2 + .75rem)}}
</style>
</head>
<body class="forest">
<div class="app"><section id="game" class="game"><div class="hero"><div class="top"><div><div class="eyebrow">Command Zone</div><h1 class="brand">MTG Buddy</h1></div><div class="topActions"><button id="startBtn" class="startBtn" onclick="toggleStart()">Start 40</button><button class="reset" onclick="resetLife()">Reset</button><div id="startMenu" class="startMenu"></div></div></div><div class="lifeRow"><button class="big" onclick="life(-1)">-</button><output id="life" class="life">40</output><button class="big" onclick="life(1)">+</button></div></div><div class="tracker"><div class="head"><div><h2>Permanent Ledger</h2><div id="count" class="muted">Track changing stats</div></div><button class="add" onclick="addCard()">Add</button></div><div id="cards" class="list"></div></div></section></div>
<div class="fabWrap"><nav id="menu" class="menu" aria-label="App menu"><div class="navGrid"><button onclick="openOverlay('glossary')">AZ<br>Glossary</button><button onclick="openOverlay('wallpapers')">BG<br>Wallpapers</button><button onclick="openOverlay('settings')">*<br>Settings</button></div></nav><button class="fab" onclick="toggleMenu()" aria-label="Open app menu"><span class="hamb"></span></button></div>
<div id="overlay" class="overlay"><div class="sheet"><button class="close" onclick="closeOverlay()" aria-label="Close overlay">x</button><div id="overlayContent" class="overlayBody"></div></div></div>
<script>
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});if(window.caches)caches.keys().then(keys=>keys.forEach(k=>caches.delete(k))).catch(()=>{})}
const $=id=>document.getElementById(id);const bgs=['forest','island','swamp','mountain','plains'];const names={forest:'Forest',island:'Island',swamp:'Swamp',mountain:'Mountain',plains:'Snow Plains'};const glossary=[['Adapt','Put counters on a creature if it has no +1/+1 counters on it.'],['Affinity','A spell costs less for each matching permanent you control.'],['Attach','Put an Aura, Equipment, or similar card onto a legal object.'],['Cascade','Reveal cards until you find a cheaper nonland spell, then you may cast it free.'],['Clue','Artifact token you can pay 2 and sacrifice to draw a card.'],['Commander Damage','21 combat damage from the same commander makes a player lose.'],['Commander Tax','Your commander costs 2 more for each previous command-zone cast.'],['Convoke','Tap creatures to help pay for a spell.'],['Crew','Tap creatures to turn a Vehicle into a creature.'],['Deathtouch','Any amount of damage from this source is lethal to creatures.'],['Defender','This creature cannot attack.'],['Double Strike','Deals combat damage in both first-strike and regular damage steps.'],['Enchant','Shows what an Aura can legally attach to.'],['Equip','Attach Equipment to a creature you control, usually as a sorcery.'],['Exile','A separate zone outside battlefield and graveyard.'],['First Strike','Deals combat damage before creatures without first strike.'],['Flash','You can cast it any time you could cast an instant.'],['Flying','Can be blocked only by creatures with flying or reach.'],['Food','Artifact token you can pay 2 and sacrifice to gain 3 life.'],['Graveyard','The discard pile where destroyed, used, and discarded cards often go.'],['Haste','Can attack and use tap abilities right away.'],['Hexproof','Opponents cannot target it.'],['Indestructible','Cannot be destroyed by damage or destroy effects.'],['Investigate','Create a Clue token.'],['Landfall','Triggers when a land enters under your control.'],['Lifelink','Damage from this source also gains you that much life.'],['Manifest','Put a card face down as a 2/2 creature.'],['Menace','Can be blocked only by two or more creatures.'],['Mill','Put cards from the top of a library into a graveyard.'],['Morph','Cast a card face down as a 2/2, then turn it up for its morph cost.'],['Populate','Create a copy of a creature token you control.'],['Priority','The permission to act before the game moves on.'],['Proliferate','Add another counter to permanents or players that already have counters.'],['Prowess','Gets +1/+1 whenever you cast a noncreature spell.'],['Reach','Can block creatures with flying.'],['Scry','Look at top cards and keep or bottom them.'],['Stack','The waiting area for spells and abilities. Newest resolves first.'],['Surveil','Look at top cards and keep or put them into your graveyard.'],['Treasure','Artifact token you can tap and sacrifice for one mana of any color.'],['Trample','Extra combat damage can hit the defending player.'],['Vigilance','Attacking does not tap this creature.'],['Ward','Opponents must pay an extra cost to target it.']];let s=JSON.parse(localStorage.getItem('mtg-buddy-v2')||'null')||{life:40,start:40,bg:'forest',cards:[]};if(![20,40].includes(s.start)){s.start=40;s.life=40}function save(){localStorage.setItem('mtg-buddy-v2',JSON.stringify(s))}function fmt(n){return n>=0?'+'+n:''+n}function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;')}function render(){document.body.className=s.bg;$('life').textContent=s.life;$('startBtn').textContent='Start '+s.start;$('startMenu').innerHTML='<div class="startGrid">'+[20,40].map(v=>`<button class="${s.start===v?'sel':''}" onclick="setStart(${v})">${v}</button>`).join('')+'</div>';renderCards();save()}function life(d){s.life=Math.max(0,s.life+d);render()}function resetLife(){s.life=s.start;render()}function setStart(v){s.start=v;s.life=v;$('startMenu').classList.remove('open');render()}function setBg(v){s.bg=v;render();if($('overlay').classList.contains('open'))openOverlay('wallpapers')}function toggleStart(){$('startMenu').classList.toggle('open')}function toggleMenu(){$('menu').classList.toggle('open')}function addCard(){s.cards.unshift({id:Date.now()+Math.random()+'',name:'',ba:0,bd:0,a:0,d:0});render()}function resetCard(id){let c=s.cards.find(x=>x.id===id);if(c){c.a=0;c.d=0;render()}}function delCard(id){s.cards=s.cards.filter(x=>x.id!==id);render()}function change(id,k,d){let c=s.cards.find(x=>x.id===id);if(c){c[k]+=d;render()}}function setBase(id,k,v){let c=s.cards.find(x=>x.id===id);if(c){c[k]=Number(v)||0;render()}}function rename(id,v){let c=s.cards.find(x=>x.id===id);if(c){c.name=v;save()}}function mod(c,k){return `<div class="modCluster"><output class="mod">${fmt(c[k])}</output><div class="modBtns"><button class="mini" onclick="change('${c.id}','${k}',1)">+</button><button class="mini" onclick="change('${c.id}','${k}',-1)">-</button></div></div>`}function renderCards(){$('count').textContent=s.cards.length?`${s.cards.length} permanent${s.cards.length===1?'':'s'}`:'Track changing stats';$('cards').innerHTML=s.cards.length?s.cards.map(c=>`<article class="card"><div class="cardTop"><input class="name" value="${esc(c.name)}" placeholder="Permanent name" oninput="rename('${c.id}',this.value)"><div class="basePair"><input type="number" value="${c.ba}" onchange="setBase('${c.id}','ba',this.value)" aria-label="Base power"><span>/</span><input type="number" value="${c.bd}" onchange="setBase('${c.id}','bd',this.value)" aria-label="Base toughness"></div></div><div class="statline"><span>${c.ba+c.a}</span><span>/</span><span>${c.bd+c.d}</span></div><div class="modRow">${mod(c,'a')}${mod(c,'d')}</div><div class="cardActions"><button class="cardAction" onclick="resetCard('${c.id}')">Reset</button><button class="cardAction danger" onclick="delCard('${c.id}')">x</button></div></article>`).join(''):'<div class="empty"><b>No cards yet</b><p class="muted">Add permanents whose stats keep shifting during the game.</p></div>'}function renderGlossary(){let q=($('q')?.value||'').toLowerCase();$('terms').innerHTML=glossary.filter(t=>(t[0]+t[1]).toLowerCase().includes(q)).map(t=>`<details class="term"><summary>${t[0]}</summary><p>${t[1]}</p></details>`).join('')||'<div class="panel"><b>No matches</b><p class="muted">Try flying, combat, token, or commander.</p></div>'}function openOverlay(kind){$('menu').classList.remove('open');$('startMenu').classList.remove('open');$('overlay').classList.add('open');if(kind==='glossary'){$('overlayContent').innerHTML='<div class="stickyHead"><div class="eyebrow">Rules Tome</div><h1 class="brand">Glossary</h1><input id="q" class="search" placeholder="Search flying, trample, commander..." oninput="renderGlossary()"></div><div id="terms"></div>';renderGlossary()}if(kind==='wallpapers'){$('overlayContent').innerHTML='<div class="eyebrow">Planeswalk</div><h1 class="brand">Wallpapers</h1><div class="panel"><h2>Land Skin</h2><div class="skinGrid">'+bgs.map(x=>`<button class="${s.bg===x?'sel':''}" onclick="setBg('${x}')"><span class="thumb" style="--thumb:var(--${x})"></span><span>${names[x]}</span></button>`).join('')+'</div></div>'}if(kind==='settings'){$('overlayContent').innerHTML='<div class="eyebrow">Sanctum Setup</div><h1 class="brand">Settings</h1><div class="panel"><h2>Future Tools</h2><p class="muted">Commander damage, poison, dice roller, turn tracker, tokens, and notes can live here later.</p></div><div class="panel"><button class="add danger" onclick="resetAll()">Reset Everything</button></div>'}}function closeOverlay(){$('overlay').classList.remove('open');$('overlayContent').innerHTML=''}function resetAll(){localStorage.removeItem('mtg-buddy-v2');s={life:40,start:40,bg:'forest',cards:[]};closeOverlay();render()}render();
</script>
</body>
</html>
